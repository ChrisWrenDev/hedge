services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hedge
      POSTGRES_PASSWORD: hedge
      POSTGRES_DB: hedge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hedge:hedge@db:5432/hedge
      DATABASE_URL_SYNC: postgresql://hedge:hedge@db:5432/hedge
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
